<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Modernización AGROIDEAS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --pcm-red: #c9002b;
            --agro-blue: #1e3a8a;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast-enter { animation: slideInRight 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-800 h-screen overflow-hidden flex">

    <!-- Access restricted via auth.js overlay (injected automatically) -->

    <!-- Main Admin View -->
    <div id="admin-view" class="flex h-screen w-full opacity-0 pointer-events-none transition-opacity duration-500">
        
        <!-- Sidebar Navigation -->
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col h-full shadow-2xl relative z-20">
            <div class="p-6 border-b border-slate-800 flex items-center gap-3">
                <div class="bg-red-600 text-white p-2 rounded-lg">
                    <i data-lucide="database" class="w-5 h-5"></i>
                </div>
                <div>
                    <h2 class="text-white font-bold tracking-wide">CMS Admin</h2>
                    <p class="text-[10px] uppercase tracking-widest text-slate-500">Agroideas v3.0</p>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Gestión de Datos</p>
                
                <button onclick="switchTab('sections')" id="nav-sections" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl bg-red-600 text-white transition-all">
                    <i data-lucide="layout-template" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Secciones Técnicas</span>
                </button>
                
                <button onclick="switchTab('documents')" id="nav-documents" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="folder-open" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Documentos (Cards)</span>
                </button>
                
                <button onclick="switchTab('repository')" id="nav-repository" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="archive" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Repositorio</span>
                </button>

                <p class="px-2 text-xs font-semibold text-slate-500 uppercase tracking-wider mt-6 mb-2">Control de Usuario</p>
                <button onclick="switchTab('users')" id="nav-users" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-800 hover:text-white transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i>
                    <span class="font-medium text-sm">Usuarios</span>
                </button>
            </nav>

            <div class="p-4 border-t border-slate-800 space-y-2">
                <button onclick="exportJSON()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors text-sm">
                    <i data-lucide="download" class="w-4 h-4"></i> Exportar content.json
                </button>
                <button onclick="exportUsersJSON()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 transition-colors text-sm">
                    <i data-lucide="users" class="w-4 h-4"></i> Exportar users.json
                </button>
                <button onclick="resetToDefaults()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg border border-slate-700 text-slate-400 hover:bg-slate-800 transition-colors text-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Restablecer BD (JSON)
                </button>
                <button onclick="authSystem.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg border border-red-900/50 text-red-400 hover:bg-red-900/30 transition-colors text-sm">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 bg-slate-50 h-full overflow-y-auto relative">
            <!-- Header interior -->
            <header class="bg-white px-8 py-5 border-b border-slate-200 sticky top-0 z-10 flex justify-between items-center">
                <h2 id="page-title" class="text-2xl font-bold text-slate-800">Secciones Técnicas</h2>
                <div class="flex items-center gap-4">
                    <div class="text-right">
                        <p id="user-display-name" class="text-sm font-bold text-slate-900 leading-none">Cargando...</p>
                        <p id="user-display-role" class="text-[10px] font-black uppercase text-slate-400">Admin</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-red-50 border-2 border-white shadow-sm flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-red-600"></i>
                    </div>
                </div>
            </header>

            <!-- Contenedor Dinámico -->
            <div class="p-8">
                <div id="content-area" class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden min-h-[400px]">
                    <!-- Inyectado vía JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 id="modal-title" class="font-bold text-lg text-slate-800">Editar Registro</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            <div class="p-6 overflow-y-auto flex-1">
                <form id="dynamic-form" class="space-y-6">
                    <!-- Inyectado vía JS -->
                </form>
            </div>
            
            <div class="px-6 py-4 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-5 py-2 rounded-xl font-medium text-slate-600 hover:bg-slate-200 transition-colors">Cancelar</button>
                <button onclick="saveRecord()" class="px-5 py-2 rounded-xl font-bold bg-slate-900 text-white hover:bg-red-600 transition-colors flex items-center gap-2 shadow-lg">
                    <i data-lucide="save" class="w-4 h-4"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 z-[120] flex flex-col gap-3"></div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/admin-logic.js"></script>
</body>
</html>
